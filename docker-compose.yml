version: '3.8'

services:
  dataworks-add-dimension:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dataworks-add-dimension
    ports:
      - "8080:8080"
    environment:
      - DATAWORK_ACCESS_ID=${DATAWORK_ACCESS_ID}
      - DATAWORK_ACCESS_KEY=${DATAWORK_ACCESS_KEY}
      - DATAWORK_REGION_ID=${DATAWORK_REGION_ID:-ap-southeast-1}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
